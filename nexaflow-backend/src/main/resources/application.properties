# ═══════════════════════════════════════════════════════════════════
#  NexaFlow v3.0 — Spring Boot Configuration
# ═══════════════════════════════════════════════════════════════════

# ── Server Configuration ───────────────────────────────────────────
server.port=${SERVER_PORT:8080}
spring.application.name=nexaflow-backend
server.error.include-message=always
server.error.include-binding-errors=always


# ── Database Configuration (Supports MySQL for Production, H2 for Development) ──
# On Railway: Set SPRING_DATASOURCE_URL and related env variables
# Local: Uses H2 by default, or set env vars to use local MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:nexaflow_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── H2 Console (for development with H2 database) ─────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Security Configuration ──────────────────────────────────────────
# JWT Secret (Read from environment, fallback for local development)
app.jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_minimum_32_characters_CHANGE_THIS_IN_PRODUCTION}
app.jwt.expiration=${JWT_EXPIRATION_MS:604800000}

# ── Application URL ─────────────────────────────────────────────────
app.url=${APP_URL:http://localhost:8080}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# ── Razorpay Configuration (India Payments) ────────────────────────
# Get from: https://dashboard.razorpay.com/app/keys
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.enabled=${RAZORPAY_ENABLED:false}

# ── Stripe Configuration (International Payments) ──────────────────
# Get from: https://dashboard.stripe.com/apikeys
stripe.api.key=${STRIPE_API_KEY:}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:}
stripe.enabled=${STRIPE_ENABLED:false}

# ── Email Configuration (SMTP) ──────────────────────────────────────
# Can use Gmail or Brevo. Environment variables override defaults.
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:your@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your_app_password_here}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.from=${MAIL_FROM_EMAIL:your@gmail.com}
mail.from.name=${MAIL_FROM_NAME:NexaFlow}

# ── Brevo Email API (Alternative to SMTP) ──────────────────────────
# Sign up: https://app.brevo.com → SMTP & API → API Keys
brevo.api.key=${BREVO_API_KEY:}
brevo.from.email=${BREVO_FROM_EMAIL:your@email.com}
brevo.from.name=${BREVO_FROM_NAME:NexaFlow}

# ── Anthropic AI Configuration ─────────────────────────────────────
# Get from: https://console.anthropic.com/settings/keys
anthropic.api.key=

# ── Currency Configuration ──────────────────────────────────────────
app.currency.default.usd-to-inr=83.5
app.currency.api.url=https://api.exchangerate-api.com/v4/latest/USD
app.currency.refresh.interval.hours=6

# ── File Upload Configuration ───────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging Configuration ───────────────────────────────────────────
logging.level.root=INFO
logging.level.com.nexaflow=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ── CORS Configuration ──────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# ── Default Admin Credentials ───────────────────────────────────────
app.admin.email=admin@nexaflow.in
app.admin.password=Admin@123
app.admin.name=System Admin

# ── Default Demo Client Credentials ────────────────────────────────
app.demo.client.email=client@demo.com
app.demo.client.password=Client@123
app.demo.client.name=Demo Client
