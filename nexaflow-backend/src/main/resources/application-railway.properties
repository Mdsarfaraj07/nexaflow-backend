# NexaFlow Production Config - Railway Deployment
# ================================================

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# Database Configuration (MySQL on Railway)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:nexaflow_db}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JWT Configuration
app.jwt.secret=${JWT_SECRET:change_this_to_long_random_string_in_production_minimum_32_chars}
app.jwt.expiration=${JWT_EXPIRATION:604800000}

# CORS Configuration (Railway auto-assigns domain)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*

# Email Configuration - Brevo SMTP
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=${MAIL_FROM:noreply@nexaflow.com}

# Razorpay Configuration (India Payments)
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# Stripe Configuration (International Payments)
stripe.api.key=${STRIPE_SECRET_KEY:}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:}

# Exchange Rate Configuration
exchange.rate.api=${EXCHANGE_RATE_API_URL:https://api.exchangerate-api.com/v4/latest/USD}
exchange.rate.default-usd-to-inr=${DEFAULT_USD_TO_INR:83.5}
exchange.rate.cache-duration=${EXCHANGE_RATE_CACHE_DURATION:21600000}

# Application Configuration
app.name=NexaFlow
app.version=3.0.0
app.environment=production

# Logging Configuration
logging.level.root=INFO
logging.level.com.nexaflow=INFO
logging.level.org.springframework.security=INFO
