# ═══════════════════════════════════════════════════════════════════
#  NexaFlow v3.0 — Spring Boot Production Configuration
# ═══════════════════════════════════════════════════════════════════

# ── Server Configuration ───────────────────────────────────────────
server.port=8080
spring.application.name=nexaflow-backend
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always
server.compression.enabled=true
server.compression.min-response-size=1024

# ── Database Configuration (MySQL - Production) ──────────────────
# For production, use a managed database service
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:nexaflow_db}?useSSL=${DB_SSL:false}&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:sarfaraj7520}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate Configuration ─────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ── Connection Pooling ──────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# ── Security Configuration ──────────────────────────────────────────
# JWT Configuration
app.jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_minimum_32_characters_CHANGE_THIS_IN_PRODUCTION}
app.jwt.expiration=604800000

# ── CORS Configuration ────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,https://yourdomain.com,https://www.yourdomain.com}

# ── Application URLs ────────────────────────────────────────────────
app.url=https://yourdomain.com/api
app.frontend.url=https://yourdomain.com

# ── Razorpay Configuration ──────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# ── Stripe Configuration ────────────────────────────────────────────
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# ── Email Configuration ─────────────────────────────────────────────
mail.smtp.host=${SMTP_HOST:smtp.gmail.com}
mail.smtp.port=${SMTP_PORT:587}
mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.smtp.starttls.required=true
mail.smtp.user=${SMTP_USER:}
mail.smtp.password=${SMTP_PASSWORD:}
mail.from=${MAIL_FROM:noreply@yourdomain.com}

# ── Logging Configuration ──────────────────────────────────────────
logging.level.root=INFO
logging.level.com.nexaflow=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${LOG_FILE:logs/nexaflow.log}
logging.file.max-size=10MB
logging.file.max-history=30

# ── Actuator Configuration (Monitoring) ──────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
