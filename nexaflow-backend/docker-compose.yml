version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexaflow-postgres
    environment:
      POSTGRES_DB: nexaflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexaflow-network

  backend:
    build: .
    container_name: nexaflow-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexaflow_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - nexaflow-network

volumes:
  postgres_data:

networks:
  nexaflow-network:
    driver: bridge
