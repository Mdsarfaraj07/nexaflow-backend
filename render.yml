services:
  - type: web
    name: nexaflow-backend
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: PORT
        value: "8080"

  - type: web
    name: nexaflow-frontend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: cd nexaflow-v3-complete && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

  - type: pserv
    name: nexaflow-postgres
    runtime: postgres15
    plan: free
